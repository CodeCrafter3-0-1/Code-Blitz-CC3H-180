<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>HealthGuard Voice Doctor AI</title>

<link rel="stylesheet" href="/static/style.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#e0f2fe,#f8fafc,#dbeafe);
}

.voice-page{
max-width:1000px;
margin:auto;
padding:40px 20px;
}

.voice-header{
text-align:center;
margin-bottom:30px;
}

.voice-header h1{
font-size:38px;
color:#0f172a;
margin-bottom:10px;
}

.voice-header p{
color:#475569;
font-size:18px;
}

.voice-box{
background:#ffffff;
border-radius:24px;
padding:40px;
box-shadow:0 15px 35px rgba(0,0,0,0.08);
text-align:center;
}

.mic-btn{
width:95px;
height:95px;
border:none;
border-radius:50%;
font-size:34px;
cursor:pointer;
background:linear-gradient(135deg,#0ea5e9,#2563eb);
color:white;
box-shadow:0 12px 30px rgba(14,165,233,.35);
transition:.3s;
animation:pulse 2s infinite;
}

.mic-btn:hover{
transform:scale(1.08);
}

@keyframes pulse{
0%{box-shadow:0 0 0 0 rgba(14,165,233,.4);}
70%{box-shadow:0 0 0 20px rgba(14,165,233,0);}
100%{box-shadow:0 0 0 0 rgba(14,165,233,0);}
}

.status{
margin-top:18px;
font-weight:700;
color:#0284c7;
}

.voice-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:30px;
}

.voice-card{
background:#f8fafc;
padding:22px;
border-radius:18px;
text-align:left;
border:1px solid #e2e8f0;
min-height:170px;
}

.voice-card h3{
margin-top:0;
color:#0f172a;
font-size:20px;
}

.voice-card p{
color:#475569;
line-height:1.7;
font-size:16px;
}

.action-row{
margin-top:25px;
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

.btn{
padding:13px 24px;
border:none;
border-radius:12px;
font-weight:700;
cursor:pointer;
text-decoration:none;
}

.btn-primary{
background:#0ea5e9;
color:white;
}

.btn-dark{
background:#0f172a;
color:white;
}

@media(max-width:768px){
.voice-grid{
grid-template-columns:1fr;
}
.voice-header h1{
font-size:30px;
}
}
</style>

</head>
<body>

<div class="voice-page">

<div class="voice-header">
<h1>🎤 HealthGuard Voice Doctor</h1>
<p>Speak your symptoms and get instant professional voice guidance.</p>
</div>

<div class="voice-box">

<button class="mic-btn" onclick="startListening()" id="micBtn">
🎤
</button>

<div class="status" id="statusText">
Ready to listen...
</div>

<div class="voice-grid">

<div class="voice-card">
<h3>🗣 You Said</h3>
<p id="userText">Waiting for your voice input...</p>
</div>

<div class="voice-card">
<h3>🤖 AI Doctor Advice</h3>
<p id="botReply">Your health guidance will appear here.</p>
</div>

</div>

<div class="action-row">
<button class="btn btn-primary" onclick="speakAgain()">🔊 Repeat</button>
<a href="/dashboard" class="btn btn-dark">Dashboard</a>
</div>

</div>

</div>

<script>

let lastReply = "";

/* Load voices */
window.speechSynthesis.onvoiceschanged = function(){
speechSynthesis.getVoices();
};

function startListening(){

document.getElementById("statusText").innerHTML =
"🎤 Listening... Speak now";

const SpeechRecognition =
window.SpeechRecognition ||
window.webkitSpeechRecognition;

if(!SpeechRecognition){
alert("Voice recognition not supported in this browser. Use Chrome.");
return;
}

const recognition = new SpeechRecognition();

recognition.lang = "en-IN";
recognition.interimResults = false;
recognition.maxAlternatives = 1;

recognition.start();

recognition.onresult = function(event){

let text = event.results[0][0].transcript;

document.getElementById("userText").innerHTML = text;
document.getElementById("statusText").innerHTML =
"✅ Voice received";

replyAI(text.toLowerCase());

};

recognition.onerror = function(){
document.getElementById("statusText").innerHTML =
"❌ Could not hear you. Try again.";
};

}

function replyAI(msg){

let reply = "";

if(msg.includes("fever")){
reply = "You may have fever symptoms. Please rest, drink water, monitor temperature and consult a doctor if fever continues more than two days.";
}

else if(msg.includes("cough")){
reply = "Cough symptoms detected. Take warm water, steam inhalation and avoid cold food. If cough persists for a week, seek medical care.";
}

else if(msg.includes("headache")){
reply = "Headache may be caused by dehydration, stress or lack of sleep. Rest properly and stay hydrated. Severe headache needs doctor attention.";
}

else if(msg.includes("sugar") || msg.includes("diabetes")){
reply = "Diabetes concern detected. Avoid sugary food, walk daily and monitor blood sugar levels regularly.";
}

else if(msg.includes("bp") || msg.includes("blood pressure")){
reply = "Blood pressure concern identified. Reduce salt intake, avoid stress and check BP regularly.";
}

else if(msg.includes("chest pain")){
reply = "Chest pain can be serious. Please seek emergency medical help immediately.";
}

else{
reply = "Please describe symptoms like fever, cough, headache, chest pain, diabetes or blood pressure for better guidance.";
}

document.getElementById("botReply").innerHTML = reply;

lastReply = reply;

speakText(reply);

}

function speakText(text){

if(!('speechSynthesis' in window)){
alert("Voice speaking not supported.");
return;
}

speechSynthesis.cancel();

let speech = new SpeechSynthesisUtterance(text);

speech.lang = "en-US";
speech.rate = 0.95;
speech.pitch = 1;
speech.volume = 1;

let voices = speechSynthesis.getVoices();

if(voices.length > 0){
speech.voice = voices.find(v => v.lang.includes("en")) || voices[0];
}

setTimeout(()=>{
speechSynthesis.speak(speech);
},300);

}

function speakAgain(){
if(lastReply != ""){
speakText(lastReply);
}
}

</script>

</body>
</html>
